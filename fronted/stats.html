<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Статистика | Тихий Напоминатель</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-white);
            padding: 1.5rem;
            border-radius: 16px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .stat-card h3 {
            font-size: 2rem;
            color: var(--primary-green);
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
        }
        .chart-card {
            background: var(--bg-white);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        canvas {
            max-height: 300px;
            width: 100% !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-bell"></i>
                <h1>Тихий Напоминатель</h1>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i><span>Главная</span></a>
                <a href="stats.html" class="nav-link active"><i class="fas fa-chart-line"></i><span>Статистика</span></a>
                <a href="calendar.html" class="nav-link"><i class="fas fa-calendar-alt"></i><span>Календарь</span></a>
                <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i><span>Настройки</span></a>
            </nav>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <h2><i class="fas fa-chart-line"></i> Статистика</h2>
                <button class="btn-notification" id="refreshBtn"><i class="fas fa-sync-alt"></i> Обновить</button>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><h3 id="totalCount">0</h3><p>Всего напоминаний</p></div>
                <div class="stat-card"><h3 id="completedCount">0</h3><p>Выполнено</p></div>
                <div class="stat-card"><h3 id="completionRate">0%</h3><p>Процент выполнения</p></div>
                <div class="stat-card"><h3 id="highCount">0</h3><p>Высокий приоритет</p></div>
            </div>
            <div class="charts-grid">
                <div class="chart-card"><h3>Приоритеты</h3><canvas id="priorityChart"></canvas></div>
                <div class="chart-card"><h3>Дни недели</h3><canvas id="weekdayChart"></canvas></div>
            </div>
        </main>
    </div>
    <script src="stats.js"></script>
</body>
</html>
