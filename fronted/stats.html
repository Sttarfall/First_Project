<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика | Тихий напоминатель</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stats.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <!-- Боковая панель -->
        </aside>

        <main class="main-content">
            <header class="header">
                <h2>Статистика продуктивности</h2>
                <div class="time-filter">
                    <select id="time-period">
                        <option value="week">Неделя</option>
                        <option value="month" selected>Месяц</option>
                        <option value="year">Год</option>
                        <option value="all">Все время</option>
                    </select>
                </div>
            </header>

            <!-- Карточки статистики -->
            <div class="stats-cards">
                <div class="stats-card">
                    <div class="stats-icon" style="background-color: rgba(46, 139, 87, 0.1);">
                        <i class="fas fa-tasks" style="color: var(--primary-green);"></i>
                    </div>
                    <div class="stats-info">
                        <h3 id="total-count">0</h3>
                        <p>Всего напоминаний</p>
                    </div>
                </div>

                <div class="stats-card">
                    <div class="stats-icon" style="background-color: rgba(106, 90, 205, 0.1);">
                        <i class="fas fa-check-circle" style="color: var(--complementary);"></i>
                    </div>
                    <div class="stats-info">
                        <h3 id="completed-count">0</h3>
                        <p>Выполнено</p>
                    </div>
                </div>

                <div class="stats-card">
                    <div class="stats-icon" style="background-color: rgba(52, 152, 219, 0.1);">
                        <i class="fas fa-chart-line" style="color: #3498db;"></i>
                    </div>
                    <div class="stats-info">
                        <h3 id="completion-rate">0%</h3>
                        <p>Процент выполнения</p>
                    </div>
                </div>

                <div class="stats-card">
                    <div class="stats-icon" style="background-color: rgba(231, 76, 60, 0.1);">
                        <i class="fas fa-exclamation-triangle" style="color: #e74c3c;"></i>
                    </div>
                    <div class="stats-info">
                        <h3 id="high-priority-count">0</h3>
                        <p>Высокий приоритет</p>
                    </div>
                </div>
            </div>

            <!-- Графики -->
            <div class="charts-container">
                <div class="chart-box">
                    <h3>Распределение по приоритетам</h3>
                    <canvas id="priorityChart"></canvas>
                </div>

                <div class="chart-box">
                    <h3>Активность по дням недели</h3>
                    <canvas id="weekdayChart"></canvas>
                </div>

                <div class="chart-box full-width">
                    <h3>Прогресс выполнения по времени</h3>
                    <canvas id="timelineChart"></canvas>
                </div>
            </div>

            <!-- Подробная статистика -->
            <div class="detailed-stats">
                <h3>Детальная статистика</h3>
                <div class="stats-table">
                    <table id="stats-table">
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>Создано</th>
                                <th>Выполнено</th>
                                <th>Процент</th>
                                <th>Среднее в день</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Данные будут загружены через JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="stats.js"></script>
    
</body>
</html>
