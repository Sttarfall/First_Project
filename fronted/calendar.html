<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь | Тихий Напоминатель</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .calendar-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .calendar-nav {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .calendar-nav button {
            background-color: var(--primary-green);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .calendar-nav button:hover {
            background-color: var(--dark-green);
        }

        #current-month {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-dark);
            min-width: 200px;
            text-align: center;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 1rem;
        }

        .calendar-day-header {
            text-align: center;
            font-weight: 600;
            color: var(--text-light);
            padding: 10px;
            background-color: var(--background);
            border-radius: 8px;
        }

        .calendar-day {
            min-height: 100px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: white;
            position: relative;
        }

        .calendar-day:hover {
            background-color: var(--background);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .calendar-day.other-month {
            opacity: 0.4;
            background-color: #f9f9f9;
        }

        .calendar-day.today {
            border: 2px solid var(--complementary);
            background-color: rgba(106, 90, 205, 0.1);
        }

        .calendar-day.selected {
            background-color: rgba(46, 139, 87, 0.2);
            border-color: var(--primary-green);
        }

        .day-number {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .day-events {
            font-size: 0.75rem;
            max-height: 60px;
            overflow-y: auto;
        }

        .event-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }

        .event-dot.high { background-color: #e74c3c; }
        .event-dot.medium { background-color: var(--primary-green); }
        .event-dot.low { background-color: #3498db; }

        .event-item {
            margin: 2px 0;
            padding: 2px 4px;
            border-radius: 4px;
            background-color: rgba(46, 139, 87, 0.1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.7rem;
        }

        .no-events {
            color: var(--text-light);
            font-style: italic;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .day-details {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        .day-details h3 {
            margin-bottom: 1.5rem;
            color: var(--primary-green);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .events-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .event-card {
            padding: 1rem;
            border-left: 4px solid var(--primary-green);
            background-color: var(--background);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .event-card.high { border-left-color: #e74c3c; }
        .event-card.medium { border-left-color: var(--primary-green); }
        .event-card.low { border-left-color: #3498db; }

        .event-time {
            font-weight: 600;
            color: var(--complementary);
            min-width: 80px;
        }

        .event-info {
            flex: 1;
            margin: 0 1rem;
        }

        .event-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .event-description {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .view-toggle {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .view-btn {
            padding: 0.5rem 1.5rem;
            border: 1px solid var(--border-color);
            background-color: transparent;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .view-btn:hover {
            border-color: var(--primary-green);
        }

        .view-btn.active {
            background-color: var(--primary-green);
            color: white;
            border-color: var(--primary-green);
        }

        .week-view, .day-view {
            display: none;
        }

        .week-view.active, .day-view.active {
            display: block;
        }

        .today-btn {
            background-color: var(--complementary) !important;
            margin-left: 1rem;
        }

        .today-btn:hover {
            background-color: var(--light-complementary) !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-bell"></i>
                <h1>Тихий Напоминатель</h1>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-number" id="total-reminders">0</span>
                    <span class="stat-label">Всего напоминаний</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="today-reminders">0</span>
                    <span class="stat-label">Сегодня</span>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Главная</a>
                <a href="calendar.html" class="nav-link active"><i class="fas fa-calendar-alt"></i> Календарь</a>
                <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Настройки</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h2>Календарь напоминаний</h2>
                <button class="btn-notifications" onclick="window.location.href='index.html'">
                    <i class="fas fa-plus"></i> Новое напоминание
                </button>
            </header>

            <div class="view-toggle">
                <button class="view-btn active" data-view="month">Месяц</button>
                <button class="view-btn" data-view="week">Неделя</button>
                <button class="view-btn" data-view="day">День</button>
            </div>

            <div class="calendar-container">
                <div class="calendar-header">
                    <div class="calendar-nav">
                        <button id="prev-month"><i class="fas fa-chevron-left"></i></button>
                        <h3 id="current-month">Январь 2024</h3>
                        <button id="next-month"><i class="fas fa-chevron-right"></i></button>
                        <button id="today-btn" class="today-btn">Сегодня</button>
                    </div>
                    <div>
                        <button id="create-event" class="btn-notifications">
                            <i class="fas fa-plus"></i> Создать
                        </button>
                    </div>
                </div>

                <div class="month-view active" id="month-view">
                    <div class="calendar-grid">
                        <div class="calendar-day-header">Пн</div>
                        <div class="calendar-day-header">Вт</div>
                        <div class="calendar-day-header">Ср</div>
                        <div class="calendar-day-header">Чт</div>
                        <div class="calendar-day-header">Пт</div>
                        <div class="calendar-day-header">Сб</div>
                        <div class="calendar-day-header">Вс</div>
                    </div>
                    <div class="calendar-grid" id="calendar-days">
                        <!-- Дни будут заполнены через JavaScript -->
                    </div>
                </div>

                <div class="week-view" id="week-view">
                    <div class="week-calendar" id="week-calendar">
                        <!-- Недельный вид будет заполнен через JavaScript -->
                    </div>
                </div>

                <div class="day-view" id="day-view">
                    <div class="day-calendar" id="day-calendar">
                        <!-- Дневной вид будет заполнен через JavaScript -->
                    </div>
                </div>
            </div>

            <div class="day-details">
                <h3><i class="fas fa-calendar-day"></i> Напоминания на <span id="selected-date">сегодня</span></h3>
                <div class="events-list" id="day-events">
                    <!-- Напоминания для выбранного дня -->
                    <div class="no-events">Выберите день для просмотра напоминаний</div>
                </div>
            </div>
        </main>
    </div>

    <script src="calendar-script.js"></script>
</body>
</html>
