<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тихий Напоминатель | Главная</title>
    
    <!-- Подключение шрифтов и иконок -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Подключение общих стилей -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Подключение специфичных стилей для главной страницы -->
    <style>
        /* Дополнительные стили только для главной страницы */
        .create-reminder {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }
        
        .reminders-list {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow);
        }
        
        .reminder-item {
            background: var(--background);
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary-green);
            transition: all 0.3s;
        }
        
        .reminder-item:hover {
            transform: translateX(5px);
            box-shadow: var(--shadow);
        }
        
        .reminder-item.high { border-left-color: #e74c3c; }
        .reminder-item.medium { border-left-color: var(--primary-green); }
        .reminder-item.low { border-left-color: #3498db; }
        
        .form-row {
            display: flex;
            gap: 1rem;
        }
        
        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Боковая панель навигации -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-bell"></i>
                <h1>Тихий Напоминатель</h1>
            </div>
            
            <div class="stats-widget">
                <div class="stat-item">
                    <span class="stat-number" id="sidebar-total">0</span>
                    <span class="stat-label">Всего</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="sidebar-today">0</span>
                    <span class="stat-label">Сегодня</span>
                </div>
            </div>
            
            <nav class="nav-menu">
                <a href="index.html" class="nav-link active">
                    <i class="fas fa-home"></i>
                    <span>Главная</span>
                </a>
                <a href="stats.html" class="nav-link">
                    <i class="fas fa-chart-line"></i>
                    <span>Статистика</span>
                </a>
                <a href="calendar.html" class="nav-link">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Календарь</span>
                </a>
                <a href="settings.html" class="nav-link">
                    <i class="fas fa-cog"></i>
                    <span>Настройки</span>
                </a>
            </nav>
        </aside>

        <!-- Основной контент -->
        <main class="main-content">
            <header class="page-header">
                <h2>Мои напоминания</h2>
                <button class="btn-notification" id="enableNotificationsBtn">
                    <i class="fas fa-bell"></i>
                    Включить уведомления
                </button>
            </header>

            <!-- Форма создания -->
            <section class="create-reminder">
                <h3>
                    <i class="fas fa-plus-circle"></i>
                    Создать новое напоминание
                </h3>
                
                <form id="reminderForm">
                    <div class="form-group">
                        <label for="title">
                            <i class="fas fa-heading"></i> Заголовок
                        </label>
                        <input type="text" id="title" 
                               placeholder="Например: Встреча с командой"
                               required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="date">
                                <i class="fas fa-calendar"></i> Дата
                            </label>
                            <input type="date" id="date" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="time">
                                <i class="fas fa-clock"></i> Время
                            </label>
                            <input type="time" id="time" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="description">
                            <i class="fas fa-align-left"></i> Описание
                        </label>
                        <textarea id="description" rows="3" 
                                  placeholder="Дополнительные детали..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="priority">
                            <i class="fas fa-flag"></i> Приоритет
                        </label>
                        <select id="priority">
                            <option value="low">🟢 Низкий</option>
                            <option value="medium" selected>🟡 Средний</option>
                            <option value="high">🔴 Высокий</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> Сохранить
                    </button>
                </form>
            </section>

            <!-- Список напоминаний -->
            <section class="reminders-list">
                <div class="list-header">
                    <h3>
                        <i class="fas fa-list"></i>
                        Предстоящие напоминания
                    </h3>
                    <div class="filters">
                        <button class="filter-btn active" data-filter="all">Все</button>
                        <button class="filter-btn" data-filter="today">Сегодня</button>
                        <button class="filter-btn" data-filter="week">Неделя</button>
                    </div>
                </div>
                
                <div id="remindersContainer" class="reminders-container">
                    <div class="loading-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        Загрузка...
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Уведомление -->
    <div id="notificationToast" class="toast-notification hidden">
        <div class="toast-content">
            <i class="fas fa-bell"></i>
            <div>
                <strong>Напоминание</strong>
                <p id="toastMessage"></p>
            </div>
        </div>
        <button class="toast-close">&times;</button>
    </div>

    <!-- Подключение JavaScript -->
    <script src="index.js"></script>
</body>
</html>
