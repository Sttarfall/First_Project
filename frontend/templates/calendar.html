<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь | Тихий Напоминатель</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/calendar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-bell"></i>
                <h1>Тихий Напоминатель</h1>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-number" id="total-reminders">0</span>
                    <span class="stat-label">Всего напоминаний</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="today-reminders">0</span>
                    <span class="stat-label">Сегодня</span>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Главная</a>
                <a href="calendar.html" class="nav-link active"><i class="fas fa-calendar-alt"></i> Календарь</a>
                <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Настройки</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h2>Календарь напоминаний</h2>
                <button class="btn-notifications" onclick="window.location.href='index.html'">
                    <i class="fas fa-plus"></i> Новое напоминание
                </button>
            </header>

            <div class="view-toggle">
                <button class="view-btn active" data-view="month">Месяц</button>
                <button class="view-btn" data-view="week">Неделя</button>
                <button class="view-btn" data-view="day">День</button>
            </div>

            <div class="calendar-container">
                <div class="calendar-header">
                    <div class="calendar-nav">
                        <button id="prev-month"><i class="fas fa-chevron-left"></i></button>
                        <h3 id="current-month">Январь 2024</h3>
                        <button id="next-month"><i class="fas fa-chevron-right"></i></button>
                        <button id="today-btn" class="today-btn">Сегодня</button>
                    </div>
                    <div>
                        <button id="create-event" class="btn-notifications">
                            <i class="fas fa-plus"></i> Создать
                        </button>
                    </div>
                </div>

                <div class="month-view active" id="month-view">
                    <div class="calendar-grid">
                        <div class="calendar-day-header">Пн</div>
                        <div class="calendar-day-header">Вт</div>
                        <div class="calendar-day-header">Ср</div>
                        <div class="calendar-day-header">Чт</div>
                        <div class="calendar-day-header">Пт</div>
                        <div class="calendar-day-header">Сб</div>
                        <div class="calendar-day-header">Вс</div>
                    </div>
                    <div class="calendar-grid" id="calendar-days">
                        <!-- Дни будут заполнены через JavaScript -->
                    </div>
                </div>

                <div class="week-view" id="week-view">
                    <div class="week-calendar" id="week-calendar">
                        <!-- Недельный вид будет заполнен через JavaScript -->
                    </div>
                </div>

                <div class="day-view" id="day-view">
                    <div class="day-calendar" id="day-calendar">
                        <!-- Дневной вид будет заполнен через JavaScript -->
                    </div>
                </div>
            </div>

            <div class="day-details">
                <h3><i class="fas fa-calendar-day"></i> Напоминания на <span id="selected-date">сегодня</span></h3>
                <div class="events-list" id="day-events">
                    <!-- Напоминания для выбранного дня -->
                    <div class="no-events">Выберите день для просмотра напоминаний</div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/calendar-script.js"></script>
</body>
</html>
